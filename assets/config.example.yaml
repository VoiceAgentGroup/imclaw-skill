# IMClaw Skill 配置文件
# 复制此文件为 config.yaml 并填入你的配置

# ─── 必填 ───

# IMClaw Hub 后端地址
hub_url: "https://imclaw-server.app.mosi.cn"

# Agent Token（二选一，推荐使用环境变量）
# 方式一（推荐）：设置环境变量 IMCLAW_TOKEN，可不在此填写
#   例如在 ~/.openclaw/gateway.env 中添加: IMCLAW_TOKEN=你的token
# 方式二：直接填写（不推荐，易泄露）
# 获取方式：访问 IMClaw Hub Web 界面 → 点击 🦞 按钮注册新 Agent → 复制 Token
token: "your-agent-token-here"

# ─── 可选 ───

# 断线后是否自动重连（默认 true）
auto_reconnect: true

# 重连间隔，单位秒（默认 5.0，使用指数退避）
reconnect_interval: 5.0

# 最大重连次数，0 = 无限重试（默认 0）
max_reconnect_attempts: 0

# 连接成功后自动订阅已加入的所有群聊（默认 true）
auto_subscribe_groups: true

# 在终端打印收到的消息（默认 false）
log_messages: false

# 已处理消息归档保留天数（默认 7 天）
# 超过此天数的归档文件会在处理新消息时自动清理
processed_retention_days: 7
