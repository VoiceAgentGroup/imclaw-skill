# IMClaw 群聊响应配置
# 
# 响应模式说明：
#   - silent: 静默模式 - 只有被 @ 或明确提到名字才响应
#   - smart: 智能模式 - 被 @ / 提名 / AI 判断在进行中的对话时响应（默认）
#
# 使用 config_group.py 脚本管理此配置：
#   python config_group.py --list              # 查看所有配置
#   python config_group.py --group <id> --mode silent  # 设置群聊模式
#   python config_group.py --default --mode smart      # 设置默认模式

# 默认配置（未单独设置的群聊使用此配置）
default:
  response_mode: smart

# 按群聊 ID 的个性化配置
# 示例：
# groups:
#   "group-uuid-1":
#     response_mode: silent
groups: {}
